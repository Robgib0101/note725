<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-6925363929827743">
  <title>메모장</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6925363929827743"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" aria-label="메모 목록">
      <header class="sidebar-header">
        <div>
          <p class="eyebrow">Notes</p>
          <h1>메모장</h1>
        </div>
        <button class="icon-button" id="newNoteButton" type="button" aria-label="새 메모 만들기" title="새 메모">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <label class="search-wrap" for="searchInput">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="메모 검색">
      </label>

      <div class="note-stats" aria-live="polite">
        <span id="noteCount">0개</span>
        <span id="saveStatus">저장됨</span>
      </div>

      <nav class="note-list" id="noteList" aria-label="저장된 메모"></nav>
    </aside>

    <main class="editor">
      <section class="editor-toolbar" aria-label="메모 작업">
        <div class="current-meta">
          <span id="currentDate">오늘</span>
          <span id="wordCount">0자</span>
          <span id="lineCount">0줄</span>
          <span id="readTime">1분 미만</span>
          <span id="imageCount">이미지 0개</span>
          <span id="checklistStatus">체크 0/0</span>
        </div>
        <div class="toolbar-actions">
          <button id="focusButton" class="tool-button" type="button">집중</button>
          <button id="pinButton" class="tool-button" type="button">고정</button>
          <button id="downloadButton" class="tool-button" type="button">다운로드</button>
          <button id="deleteButton" class="danger-button" type="button">삭제</button>
        </div>
      </section>

      <section class="writing-tools" aria-label="작성 도구">
        <div class="writing-tool-stack">
          <div class="tool-group">
            <button class="format-button" type="button" data-action="heading" title="제목 삽입">H</button>
            <button class="format-button" type="button" data-action="bold" title="굵게">B</button>
            <button class="format-button" type="button" data-action="bullet" title="글머리 목록">•</button>
            <button class="format-button" type="button" data-action="numbered" title="번호 목록">1.</button>
            <button class="format-button" type="button" data-action="check" title="체크리스트">☐</button>
            <button class="format-button" type="button" data-action="quote" title="인용">“</button>
            <button class="format-button" type="button" data-action="date" title="날짜 삽입">날짜</button>
          </div>
          <div class="image-tool-group">
            <label class="template-wrap" for="imageLayoutSelect">
              <span>이미지</span>
              <select id="imageLayoutSelect">
                <option value="inline">본문형</option>
                <option value="caption">캡션형</option>
                <option value="side">좌우 메모형</option>
                <option value="cover">커버형</option>
                <option value="gallery">갤러리형</option>
              </select>
            </label>
            <label class="template-wrap" for="imageStyleSelect">
              <span>스타일</span>
              <select id="imageStyleSelect">
                <option value="clean">깔끔</option>
                <option value="paper">종이</option>
                <option value="marker">마커</option>
                <option value="shadow">그림자</option>
              </select>
            </label>
            <button id="addImageButton" class="tool-button" type="button">이미지 추가</button>
            <input id="imageInput" class="visually-hidden" type="file" accept="image/*" multiple>
          </div>
        </div>
        <label class="template-wrap" for="templateSelect">
          <span>템플릿</span>
          <select id="templateSelect">
            <option value="">선택</option>
            <option value="daily">오늘 기록</option>
            <option value="meeting">회의록</option>
            <option value="idea">아이디어</option>
            <option value="tasks">작업 목록</option>
          </select>
        </label>
      </section>

      <label class="visually-hidden" for="titleInput">메모 제목</label>
      <input id="titleInput" class="title-input" type="text" maxlength="80" placeholder="제목 없음">

      <label class="tag-wrap" for="tagInput">
        <span>#</span>
        <input id="tagInput" type="text" placeholder="태그: 업무, 아이디어, 회의">
      </label>

      <section class="image-board" id="imageBoard" aria-label="이미지 메모 블록" hidden></section>

      <label class="visually-hidden" for="contentInput">메모 내용</label>
      <textarea id="contentInput" class="content-input" placeholder="생각을 적어보세요. 입력하면 자동 저장됩니다."></textarea>
    </main>
  </div>

  <template id="noteItemTemplate">
    <button class="note-item" type="button">
      <span class="note-item-title"></span>
      <span class="note-item-preview"></span>
      <span class="note-item-tags"></span>
      <span class="note-item-meta"></span>
    </button>
  </template>

  <script type="module" src="main.js"></script>
</body>
</html>
